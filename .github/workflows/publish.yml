name: Publish to NuGet

# Publishes the three packages when you publish a GitHub Release, or on manual dispatch.
# Auth is NuGet Trusted Publishing (OIDC): no stored API key — GitHub's id-token is exchanged
# for a short-lived NuGet key at publish time. Requires a Trusted Publishing policy on nuget.org
# for owner "ml6719", repo "ml-ls/PST-Builder", workflow "publish.yml".
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0). Defaults to the release tag."
        required: false

permissions:
  contents: read
  id-token: write        # required for NuGet Trusted Publishing (OIDC)

jobs:
  publish:
    name: Pack & push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then
            TAG="${{ github.event.release.tag_name }}"
            V="${TAG#v}"                       # strip a leading 'v' (v1.0.0 -> 1.0.0)
          fi
          if [ -z "$V" ]; then
            echo "::error::No version resolved (no release tag and no manual input)."; exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Publishing version $V"

      - name: Pack
        run: |
          for proj in \
            src/PstBuilder/PstBuilder.csproj \
            src/PstBuilder.Eml/PstBuilder.Eml.csproj \
            src/PstBuilder.Pim/PstBuilder.Pim.csproj \
            src/PstBuilder.All/PstBuilder.All.csproj; do
            dotnet pack "$proj" -c Release -o artifacts -p:Version=${{ steps.ver.outputs.version }}
          done

      - name: NuGet login (Trusted Publishing / OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ml6719

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
